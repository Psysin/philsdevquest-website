# netlify.toml
# Liegt im Projektwurzel: PhilsDevQuest-Website/netlify.toml

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Lokale Entwicklung: Function unter /api/subscribe erreichbar
[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200
